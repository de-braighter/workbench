<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 920" width="1120" height="920" font-family="Space Grotesk, Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="glassFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161b2c" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#0f1320" stop-opacity="0.86"/>
    </linearGradient>
    <linearGradient id="paneFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2138" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#101424" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="haloTop" cx="0.5" cy="0" r="0.8">
      <stop offset="0" stop-color="#6dd2ff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#6dd2ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloBottom" cx="0.5" cy="1" r="0.85">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1120" height="920" fill="#050608"/>
  <rect width="1120" height="920" fill="url(#haloTop)"/>
  <rect width="1120" height="920" fill="url(#haloBottom)"/>

  <!-- title -->
  <text x="560" y="40" text-anchor="middle" font-size="12" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" letter-spacing="4" fill="#6dd2ff">THE WORKBENCH PATTERN</text>
  <text x="560" y="62" text-anchor="middle" font-size="10.5" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" letter-spacing="2" fill="#6b7390">one declarative control-plane repo governs a fleet of independent, gitignored sibling repos</text>

  <!-- ============ WORKBENCH CONTROL-PLANE PANEL ============ -->
  <g filter="url(#softGlow)">
    <rect x="160" y="92" width="800" height="158" rx="16" fill="url(#paneFill)" stroke="rgba(109,210,255,0.45)" stroke-width="1.5"/>
  </g>
  <rect x="160" y="92" width="800" height="3" rx="1.5" fill="#6dd2ff" opacity="0.85"/>

  <text x="185" y="124" font-size="9.5" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" letter-spacing="2" fill="#6dd2ff">git: de-braighter/workbench</text>
  <text x="935" y="124" text-anchor="end" font-size="9.5" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" letter-spacing="2" fill="#6b7390">= the cluster root</text>

  <text x="560" y="146" text-anchor="middle" font-size="21" font-weight="600" letter-spacing="-0.2" fill="#e8ecf7">de-braighter/  —  THE WORKBENCH ROOT</text>
  <text x="560" y="167" text-anchor="middle" font-size="11" letter-spacing="0" fill="#a4adc8">the single Claude Code launch point · declarative content only — no application code</text>

  <!-- inner chips -->
  <g>
    <rect x="186" y="182" width="360" height="56" rx="11" fill="rgba(109,210,255,0.10)" stroke="rgba(109,210,255,0.42)" stroke-width="1.2"/>
    <text x="206" y="206" font-size="14" font-weight="600" fill="#e8ecf7" font-family="JetBrains Mono, ui-monospace, Menlo, monospace">.claude/</text>
    <text x="206" y="225" font-size="10" fill="#a4adc8">23 agents · 38 skills · commands · settings</text>
    <rect x="479" y="194" width="54" height="17" rx="8.5" fill="rgba(34,211,154,0.12)" stroke="rgba(34,211,154,0.45)"/>
    <text x="506" y="206" text-anchor="middle" font-size="8" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" letter-spacing="1" fill="#22d39a">canonical</text>
  </g>
  <g>
    <rect x="574" y="182" width="360" height="56" rx="11" fill="rgba(148,163,210,0.06)" stroke="rgba(148,163,210,0.20)" stroke-width="1.1"/>
    <text x="594" y="206" font-size="12.5" font-weight="500" fill="#e8ecf7" font-family="JetBrains Mono, ui-monospace, Menlo, monospace">policies · templates · workflows</text>
    <text x="594" y="225" font-size="10" fill="#a4adc8">projects/ · docs/ · repos.yaml — shared rules &amp; scaffolds</text>
  </g>

  <!-- ============ GOVERNANCE BEAMS (control plane → fleet) ============ -->
  <g stroke="#6dd2ff" stroke-width="1.1" fill="none" opacity="0.40" stroke-dasharray="3 6">
    <path d="M 560 250 L 200 392"/>
    <path d="M 560 250 L 370 392"/>
    <path d="M 560 250 L 560 392"/>
    <path d="M 560 250 L 750 392"/>
    <path d="M 560 250 L 940 392"/>
  </g>
  <g>
    <rect x="384" y="296" width="352" height="40" rx="10" fill="rgba(8,12,22,0.92)" stroke="rgba(109,210,255,0.35)"/>
    <text x="560" y="313" text-anchor="middle" font-size="10" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" letter-spacing="1.5" fill="#6dd2ff">agents · skills · policies apply to EVERY sibling  ↓</text>
    <text x="560" y="328" text-anchor="middle" font-size="9" fill="#6b7390">one launch point governs the whole fleet — never launch from inside a sibling</text>
  </g>

  <!-- ============ FLEET BOUNDARY (gitignored siblings) ============ -->
  <rect x="40" y="384" width="1040" height="468" rx="18" fill="rgba(15,19,32,0.34)" stroke="rgba(148,163,210,0.30)" stroke-width="1.3" stroke-dasharray="7 6"/>
  <rect x="62" y="372" width="430" height="24" rx="12" fill="#070a12" stroke="rgba(148,163,210,0.28)"/>
  <text x="78" y="388" font-size="9.5" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" letter-spacing="1.4" fill="#a4adc8">gitignored siblings — independent git repos, nested but NOT tracked here</text>

  <!-- column headers -->
  <text x="220" y="426" text-anchor="middle" font-size="13" font-weight="600" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" letter-spacing="2" fill="#6dd2ff">layers/</text>
  <text x="220" y="443" text-anchor="middle" font-size="9" fill="#6b7390">shared infrastructure · published @de-braighter/* packages</text>

  <text x="900" y="426" text-anchor="middle" font-size="13" font-weight="600" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" letter-spacing="2" fill="#a78bfa">domains/</text>
  <text x="900" y="443" text-anchor="middle" font-size="9" fill="#6b7390">products that consume the layers</text>

  <!-- ===== LAYERS COLUMN (left, cyan) ===== -->
  <!-- foundation -->
  <g>
    <rect x="70" y="454" width="300" height="58" rx="11" fill="url(#glassFill)" stroke="rgba(109,210,255,0.30)" stroke-width="1.2"/>
    <rect x="70" y="454" width="4" height="58" rx="2" fill="#6dd2ff"/>
    <rect x="328" y="463" width="34" height="15" rx="7.5" fill="rgba(148,163,210,0.10)" stroke="rgba(148,163,210,0.30)"/>
    <text x="345" y="474" text-anchor="middle" font-size="8" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" fill="#6b7390">git</text>
    <text x="90" y="480" font-size="14" font-weight="600" fill="#e8ecf7" font-family="JetBrains Mono, ui-monospace, Menlo, monospace">foundation</text>
    <text x="90" y="499" font-size="10" fill="#a4adc8">shared base · @de-braighter/std · lint-kit · test-kit</text>
  </g>
  <!-- substrate -->
  <g>
    <rect x="70" y="524" width="300" height="58" rx="11" fill="url(#glassFill)" stroke="rgba(109,210,255,0.42)" stroke-width="1.4"/>
    <rect x="70" y="524" width="4" height="58" rx="2" fill="#6dd2ff"/>
    <rect x="328" y="533" width="34" height="15" rx="7.5" fill="rgba(148,163,210,0.10)" stroke="rgba(148,163,210,0.30)"/>
    <text x="345" y="544" text-anchor="middle" font-size="8" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" fill="#6b7390">git</text>
    <text x="90" y="550" font-size="14" font-weight="600" fill="#e8ecf7" font-family="JetBrains Mono, ui-monospace, Menlo, monospace">substrate</text>
    <text x="90" y="569" font-size="10" fill="#a4adc8">the kernel · @de-braighter/substrate-contracts · runtime</text>
  </g>
  <!-- design-system -->
  <g>
    <rect x="70" y="594" width="300" height="58" rx="11" fill="url(#glassFill)" stroke="rgba(109,210,255,0.30)" stroke-width="1.2"/>
    <rect x="70" y="594" width="4" height="58" rx="2" fill="#6dd2ff"/>
    <rect x="328" y="603" width="34" height="15" rx="7.5" fill="rgba(148,163,210,0.10)" stroke="rgba(148,163,210,0.30)"/>
    <text x="345" y="614" text-anchor="middle" font-size="8" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" fill="#6b7390">git</text>
    <text x="90" y="620" font-size="14" font-weight="600" fill="#e8ecf7" font-family="JetBrains Mono, ui-monospace, Menlo, monospace">design-system</text>
    <text x="90" y="639" font-size="10" fill="#a4adc8">UI bricks + tokens · @de-braighter/design-system-*</text>
  </g>
  <!-- specs -->
  <g>
    <rect x="70" y="664" width="300" height="58" rx="11" fill="url(#glassFill)" stroke="rgba(109,210,255,0.30)" stroke-width="1.2"/>
    <rect x="70" y="664" width="4" height="58" rx="2" fill="#6dd2ff"/>
    <rect x="328" y="673" width="34" height="15" rx="7.5" fill="rgba(148,163,210,0.10)" stroke="rgba(148,163,210,0.30)"/>
    <text x="345" y="684" text-anchor="middle" font-size="8" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" fill="#6b7390">git</text>
    <text x="90" y="690" font-size="14" font-weight="600" fill="#e8ecf7" font-family="JetBrains Mono, ui-monospace, Menlo, monospace">specs</text>
    <text x="90" y="709" font-size="10" fill="#a4adc8">knowledge: ADRs · concepts · handbook (no code)</text>
  </g>
  <!-- platform -->
  <g>
    <rect x="70" y="734" width="300" height="58" rx="11" fill="url(#glassFill)" stroke="rgba(109,210,255,0.30)" stroke-width="1.2"/>
    <rect x="70" y="734" width="4" height="58" rx="2" fill="#6dd2ff"/>
    <rect x="328" y="743" width="34" height="15" rx="7.5" fill="rgba(148,163,210,0.10)" stroke="rgba(148,163,210,0.30)"/>
    <text x="345" y="754" text-anchor="middle" font-size="8" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" fill="#6b7390">git</text>
    <text x="90" y="760" font-size="14" font-weight="600" fill="#e8ecf7" font-family="JetBrains Mono, ui-monospace, Menlo, monospace">platform</text>
    <text x="90" y="779" font-size="10" fill="#a4adc8">shared platform services · dev docker stack</text>
  </g>

  <!-- ===== DOMAINS COLUMN (right, violet) ===== -->
  <!-- exercir -->
  <g>
    <rect x="750" y="454" width="300" height="58" rx="11" fill="url(#glassFill)" stroke="rgba(167,139,250,0.40)" stroke-width="1.3"/>
    <rect x="750" y="454" width="4" height="58" rx="2" fill="#a78bfa"/>
    <rect x="1008" y="463" width="34" height="15" rx="7.5" fill="rgba(148,163,210,0.10)" stroke="rgba(148,163,210,0.30)"/>
    <text x="1025" y="474" text-anchor="middle" font-size="8" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" fill="#6b7390">git</text>
    <text x="770" y="480" font-size="14" font-weight="600" fill="#e8ecf7" font-family="JetBrains Mono, ui-monospace, Menlo, monospace">exercir</text>
    <text x="770" y="499" font-size="10" fill="#a4adc8">team sports · pack-football (live work)</text>
  </g>
  <!-- conservation -->
  <g>
    <rect x="750" y="524" width="300" height="58" rx="11" fill="url(#glassFill)" stroke="rgba(167,139,250,0.32)" stroke-width="1.2"/>
    <rect x="750" y="524" width="4" height="58" rx="2" fill="#a78bfa"/>
    <rect x="1008" y="533" width="34" height="15" rx="7.5" fill="rgba(148,163,210,0.10)" stroke="rgba(148,163,210,0.30)"/>
    <text x="1025" y="544" text-anchor="middle" font-size="8" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" fill="#6b7390">git</text>
    <text x="770" y="550" font-size="14" font-weight="600" fill="#e8ecf7" font-family="JetBrains Mono, ui-monospace, Menlo, monospace">conservation</text>
    <text x="770" y="569" font-size="10" fill="#a4adc8">conservation-science pack</text>
  </g>
  <!-- devloop -->
  <g>
    <rect x="750" y="594" width="300" height="58" rx="11" fill="url(#glassFill)" stroke="rgba(167,139,250,0.32)" stroke-width="1.2"/>
    <rect x="750" y="594" width="4" height="58" rx="2" fill="#a78bfa"/>
    <rect x="1008" y="603" width="34" height="15" rx="7.5" fill="rgba(148,163,210,0.10)" stroke="rgba(148,163,210,0.30)"/>
    <text x="1025" y="614" text-anchor="middle" font-size="8" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" fill="#6b7390">git</text>
    <text x="770" y="620" font-size="14" font-weight="600" fill="#e8ecf7" font-family="JetBrains Mono, ui-monospace, Menlo, monospace">devloop</text>
    <text x="770" y="639" font-size="10" fill="#a4adc8">SDLC digital twin · producer calibration</text>
  </g>
  <!-- herdbook -->
  <g>
    <rect x="750" y="664" width="300" height="58" rx="11" fill="url(#glassFill)" stroke="rgba(167,139,250,0.32)" stroke-width="1.2"/>
    <rect x="750" y="664" width="4" height="58" rx="2" fill="#a78bfa"/>
    <rect x="1008" y="673" width="34" height="15" rx="7.5" fill="rgba(148,163,210,0.10)" stroke="rgba(148,163,210,0.30)"/>
    <text x="1025" y="684" text-anchor="middle" font-size="8" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" fill="#6b7390">git</text>
    <text x="770" y="690" font-size="14" font-weight="600" fill="#e8ecf7" font-family="JetBrains Mono, ui-monospace, Menlo, monospace">herdbook</text>
    <text x="770" y="709" font-size="10" fill="#a4adc8">pedigree / herdbook ops · on published kernel</text>
  </g>
  <!-- _attic -->
  <g opacity="0.62">
    <rect x="750" y="734" width="300" height="50" rx="11" fill="rgba(15,19,32,0.6)" stroke="rgba(148,163,210,0.20)" stroke-width="1" stroke-dasharray="5 5"/>
    <text x="770" y="756" font-size="13" font-weight="500" fill="#a4adc8" font-family="JetBrains Mono, ui-monospace, Menlo, monospace">_attic/</text>
    <text x="770" y="773" font-size="9.5" fill="#6b7390">preservation repo — read-only history</text>
  </g>

  <!-- ============ DEPENDENCY ARROW (domains → layers, one-way) ============ -->
  <g stroke="#a78bfa" stroke-width="1.6" fill="none" opacity="0.85" stroke-dasharray="6 5">
    <path d="M 742 600 L 388 600"/>
  </g>
  <polygon points="378,600 392,593 392,607" fill="#a78bfa" opacity="0.9"/>
  <g>
    <rect x="430" y="556" width="260" height="22" rx="11" fill="#070a12" stroke="rgba(167,139,250,0.40)"/>
    <text x="560" y="571" text-anchor="middle" font-size="10" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" letter-spacing="1.5" fill="#a78bfa">domains depend on layers — ONE-WAY</text>
  </g>
  <text x="560" y="623" text-anchor="middle" font-size="9.5" fill="#6b7390">via published @de-braighter/* packages (ADR-027)</text>
  <text x="560" y="638" text-anchor="middle" font-size="9.5" fill="#6b7390">— never relative paths across the sibling boundary</text>

  <!-- each-sibling note -->
  <text x="560" y="690" text-anchor="middle" font-size="9" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" letter-spacing="1" fill="#3d4360">each sibling: own CLAUDE.md ·</text>
  <text x="560" y="704" text-anchor="middle" font-size="9" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" letter-spacing="1" fill="#3d4360">own PR-gated git · own ci:local gate</text>
  <text x="560" y="718" text-anchor="middle" font-size="9" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" letter-spacing="1" fill="#3d4360">— borrows the root's .claude/</text>

  <!-- caption -->
  <text x="560" y="886" text-anchor="middle" font-size="11" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" letter-spacing="3.5" fill="#6dd2ff">ONE CONTROL PLANE · MANY INDEPENDENT REPOS</text>
  <text x="560" y="906" text-anchor="middle" font-size="9" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" letter-spacing="2" fill="#3d4360">physically nested for one-session reach · loosely coupled by gitignore · wired only by published packages</text>
</svg>
