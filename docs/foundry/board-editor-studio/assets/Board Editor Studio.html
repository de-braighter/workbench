document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

BF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"cc4261fa-ac4e-49b6-b52d-b413411817e4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* -------------------------------------------------------------\n   1. Base palette — neutral, skin-agnostic.\n   `bg-0` is the deepest void; `bg-3` is a raised glass panel.\n   `fg-1` is primary text; `fg-3` is whisper-quiet metadata.\n   ------------------------------------------------------------- */\n:root {\n  /* Surfaces — near-black with a hint of cool blue */\n  --bg-0: #050608;            /* page void */\n  --bg-1: #0a0d14;            /* app frame */\n  --bg-2: #0f1320;            /* card */\n  --bg-3: #161b2c;            /* raised / hover */\n  --bg-inset: #04050a;        /* sunken (input, terminal) */\n\n  /* Hairlines — translucent so they layer on glass */\n  --line-1: rgba(148, 163, 210, 0.08);   /* default border */\n  --line-2: rgba(148, 163, 210, 0.14);   /* hover / focus border */\n  --line-3: rgba(148, 163, 210, 0.22);   /* divider */\n\n  /* Foreground */\n  --fg-1: #e8ecf7;            /* primary */\n  --fg-2: #a4adc8;            /* secondary */\n  --fg-3: #6b7390;            /* tertiary / metadata */\n  --fg-4: #3d4360;            /* disabled / placeholder */\n  --fg-on-glow: #04060d;      /* text on filled accent */\n\n  /* Status — semantic, skin-independent */\n  --ok:    #22d39a;\n  --ok-bg: rgba(34, 211, 154, 0.12);\n  --warn:    #f5b544;\n  --warn-bg: rgba(245, 181, 68, 0.12);\n  --err:     #ff5d6c;\n  --err-bg:  rgba(255, 93, 108, 0.12);\n  --info:    #6dd2ff;\n  --info-bg: rgba(109, 210, 255, 0.12);\n\n  /* Default skin = exercir (cyan / electric blue) */\n  --accent:        #6dd2ff;\n  --accent-strong: #38bdf8;\n  --accent-deep:   #0ea5e9;\n  --accent-soft:   rgba(109, 210, 255, 0.16);\n  --accent-rim:    rgba(109, 210, 255, 0.45);\n  --glow:          0 0 24px rgba(109, 210, 255, 0.45),\n                   0 0 80px rgba(56, 189, 248, 0.18);\n  --glow-soft:     0 0 12px rgba(109, 210, 255, 0.30);\n\n  /* Type families */\n  --font-display: \"Space Grotesk\", ui-sans-serif, system-ui, sans-serif;\n  --font-body:    \"Inter\", ui-sans-serif, system-ui, sans-serif;\n  --font-mono:    \"JetBrains Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n\n  /* Type scale (rem-based, but with px fallbacks for slides) */\n  --fs-overline: 0.6875rem;   /* 11px — labels, tags */\n  --fs-meta:     0.75rem;     /* 12px — timestamps */\n  --fs-body-sm:  0.8125rem;   /* 13px — table rows, secondary */\n  --fs-body:     0.9375rem;   /* 15px — default body */\n  --fs-body-lg:  1.0625rem;   /* 17px — lead paragraph */\n  --fs-h4:       1.25rem;     /* 20px */\n  --fs-h3:       1.5rem;      /* 24px */\n  --fs-h2:       2rem;        /* 32px */\n  --fs-h1:       2.75rem;     /* 44px */\n  --fs-display:  4rem;        /* 64px — hero */\n\n  --lh-tight: 1.12;\n  --lh-snug:  1.3;\n  --lh-body:  1.55;\n\n  --tracking-tight: -0.02em;\n  --tracking-normal: 0;\n  --tracking-loose:  0.08em;\n  --tracking-caps:   0.14em;\n\n  /* Spacing — 4px base. Use these, not raw px. */\n  --s-1: 4px;\n  --s-2: 8px;\n  --s-3: 12px;\n  --s-4: 16px;\n  --s-5: 20px;\n  --s-6: 24px;\n  --s-8: 32px;\n  --s-10: 40px;\n  --s-12: 48px;\n  --s-16: 64px;\n  --s-20: 80px;\n\n  /* Radii — pill-and-square, no in-between */\n  --r-1: 4px;     /* tight chips */\n  --r-2: 8px;     /* inputs, small cards */\n  --r-3: 12px;    /* default card */\n  --r-4: 16px;    /* feature card */\n  --r-5: 24px;    /* hero panel */\n  --r-pill: 999px;\n\n  /* Shadows — outer (depth) + inner (glass rim) */\n  --shadow-1: 0 1px 2px rgba(0,0,0,0.4);\n  --shadow-2: 0 4px 16px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.04) inset;\n  --shadow-3: 0 12px 40px rgba(0,0,0,0.6), 0 1px 0 rgba(255,255,255,0.05) inset;\n  --shadow-4: 0 24px 80px rgba(0,0,0,0.7), 0 1px 0 rgba(255,255,255,0.06) inset;\n  --rim:      inset 0 1px 0 rgba(255,255,255,0.06),\n              inset 0 0 0 1px rgba(148,163,210,0.08);\n\n  /* Glass — the signature surface. Composed via background +\n     backdrop-filter + rim shadow. Use --glass-bg on background. */\n  --glass-bg:  linear-gradient(180deg,\n                 rgba(22, 27, 44, 0.72) 0%,\n                 rgba(15, 19, 32, 0.62) 100%);\n  --glass-blur: saturate(140%) blur(18px);\n\n  /* Motion */\n  --ease-out:    cubic-bezier(0.22, 1, 0.36, 1);\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);\n  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);\n  --dur-1: 120ms;\n  --dur-2: 200ms;\n  --dur-3: 320ms;\n  --dur-4: 520ms;\n}\n\n/* -------------------------------------------------------------\n   2. Skin overrides — only the accent layer changes.\n   ------------------------------------------------------------- */\n[data-skin=\"exercir\"] {\n  --accent:        #6dd2ff;\n  --accent-strong: #38bdf8;\n  --accent-deep:   #0ea5e9;\n  --accent-soft:   rgba(109, 210, 255, 0.16);\n  --accent-rim:    rgba(109, 210, 255, 0.45);\n  --glow:          0 0 24px rgba(109, 210, 255, 0.45),\n                   0 0 80px rgba(56, 189, 248, 0.18);\n  --glow-soft:     0 0 12px rgba(109, 210, 255, 0.30);\n}\n[data-skin=\"strategir\"] {\n  --accent:        #c9a9ff;\n  --accent-strong: #a78bfa;\n  --accent-deep:   #7c3aed;\n  --accent-soft:   rgba(201, 169, 255, 0.16);\n  --accent-rim:    rgba(201, 169, 255, 0.45);\n  --glow:          0 0 24px rgba(201, 169, 255, 0.45),\n                   0 0 80px rgba(167, 139, 250, 0.20);\n  --glow-soft:     0 0 12px rgba(201, 169, 255, 0.30);\n}\n[data-skin=\"operir\"] {\n  --accent:        #6df0b3;\n  --accent-strong: #34d399;\n  --accent-deep:   #10b981;\n  --accent-soft:   rgba(109, 240, 179, 0.16);\n  --accent-rim:    rgba(109, 240, 179, 0.45);\n  --glow:          0 0 24px rgba(109, 240, 179, 0.45),\n                   0 0 80px rgba(52, 211, 153, 0.18);\n  --glow-soft:     0 0 12px rgba(109, 240, 179, 0.30);\n}\n\n/* -------------------------------------------------------------\n   3. Element defaults — semantic mapping.\n   ------------------------------------------------------------- */\nhtml, body {\n  background: var(--bg-0);\n  color: var(--fg-1);\n  font-family: var(--font-body);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  font-feature-settings: \"ss01\", \"cv11\";\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4 {\n  font-family: var(--font-display);\n  font-weight: 600;\n  letter-spacing: var(--tracking-tight);\n  line-height: var(--lh-tight);\n  color: var(--fg-1);\n  margin: 0;\n}\nh1 { font-size: var(--fs-h1); }\nh2 { font-size: var(--fs-h2); }\nh3 { font-size: var(--fs-h3); font-weight: 500; }\nh4 { font-size: var(--fs-h4); font-weight: 500; }\n\np { margin: 0; }\n\ncode, pre, kbd, samp {\n  font-family: var(--font-mono);\n  font-size: 0.92em;\n  font-feature-settings: \"ss02\", \"cv01\";\n}\n\n/* The signature: an \"overline\" caps label used everywhere\n   in the product (panel titles, KPI labels, sidebar groups). */\n.overline {\n  font-family: var(--font-mono);\n  font-size: var(--fs-overline);\n  letter-spacing: var(--tracking-caps);\n  text-transform: uppercase;\n  color: var(--fg-3);\n  font-weight: 500;\n}\n\n/* Glass panel — the foundational surface of the system. */\n.glass {\n  background: var(--glass-bg);\n  backdrop-filter: var(--glass-blur);\n  -webkit-backdrop-filter: var(--glass-blur);\n  border: 1px solid var(--line-1);\n  border-radius: var(--r-3);\n  box-shadow: var(--shadow-2), var(--rim);\n}\n\n/* The ambient halo behind hero glass panels. */\n.halo::before {\n  content: \"\";\n  position: absolute;\n  inset: -40% -10%;\n  background: radial-gradient(ellipse at 50% 0%, var(--accent-soft), transparent 60%);\n  filter: blur(40px);\n  z-index: -1;\n  pointer-events: none;\n}\n\n/* Selection */\n::selection { background: var(--accent-soft); color: var(--fg-1); }\n\n/* Scrollbar — slim, glass-friendly */\n::-webkit-scrollbar { width: 10px; height: 10px; }\n::-webkit-scrollbar-track { background: transparent; }\n::-webkit-scrollbar-thumb {\n  background: var(--line-2);\n  border-radius: var(--r-pill);\n  border: 2px solid transparent;\n  background-clip: padding-box;\n}\n::-webkit-scrollbar-thumb:hover { background: var(--line-3); background-clip: padding-box; }\n<\u002Fstyle>\n  <style>/* =============================================================\n   de Braighter — Design Foundations\n   Tokens: color, type, spacing, radius, shadow, glass.\n   Three skins ship today: exercir (cyan), strategir (violet),\n   operir (emerald). Switch by setting [data-skin] on <html>.\n   ============================================================= */\n\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"edfcc5c7-8182-4b19-9a0b-bb4bf13bcb04\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"8798765c-b076-43f5-b66e-4a220ac7d93a\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"420e95c6-6842-4bb8-a78c-58243d976c3f\") format('woff2');\n  unicode-range: U+1F00-1FFF;\n}\n/* greek */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"2f59eb23-f0cd-4337-867c-6f314c13ec78\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037 U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"6861e758-44c5-4ef3-a19c-caffcf43bd69\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"cc4261fa-ac4e-49b6-b52d-b413411817e4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* -------------------------------------------------------------\n   1. Base palette — neutral, skin-agnostic.\n   `bg-0` is the deepest void; `bg-3` is a raised glass panel.\n   `fg-1` is primary text; `fg-3` is whisper-quiet metadata.\n   ------------------------------------------------------------- */\n:root {\n  /* Surfaces — near-black with a hint of cool blue */\n  --bg-0: #050608;            /* page void */\n  --bg-1: #0a0d14;            /* app frame */\n  --bg-2: #0f1320;            /* card */\n  --bg-3: #161b2c;            /* raised / hover */\n  --bg-inset: #04050a;        /* sunken (input, terminal) */\n\n  /* Hairlines — translucent so they layer on glass */\n  --line-1: rgba(148, 163, 210, 0.08);   /* default border */\n  --line-2: rgba(148, 163, 210, 0.14);   /* hover / focus border */\n  --line-3: rgba(148, 163, 210, 0.22);   /* divider */\n\n  /* Foreground */\n  --fg-1: #e8ecf7;            /* primary */\n  --fg-2: #a4adc8;            /* secondary */\n  --fg-3: #6b7390;            /* tertiary / metadata */\n  --fg-4: #3d4360;            /* disabled / placeholder */\n  --fg-on-glow: #04060d;      /* text on filled accent */\n\n  /* Status — semantic, skin-independent */\n  --ok:    #22d39a;\n  --ok-bg: rgba(34, 211, 154, 0.12);\n  --warn:    #f5b544;\n  --warn-bg: rgba(245, 181, 68, 0.12);\n  --err:     #ff5d6c;\n  --err-bg:  rgba(255, 93, 108, 0.12);\n  --info:    #6dd2ff;\n  --info-bg: rgba(109, 210, 255, 0.12);\n\n  /* Default skin = exercir (cyan / electric blue) */\n  --accent:        #6dd2ff;\n  --accent-strong: #38bdf8;\n  --accent-deep:   #0ea5e9;\n  --accent-soft:   rgba(109, 210, 255, 0.16);\n  --accent-rim:    rgba(109, 210, 255, 0.45);\n  --glow:          0 0 24px rgba(109, 210, 255, 0.45),\n                   0 0 80px rgba(56, 189, 248, 0.18);\n  --glow-soft:     0 0 12px rgba(109, 210, 255, 0.30);\n\n  /* Type families */\n  --font-display: \"Space Grotesk\", ui-sans-serif, system-ui, sans-serif;\n  --font-body:    \"Inter\", ui-sans-serif, system-ui, sans-serif;\n  --font-mono:    \"JetBrains Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n\n  /* Type scale (rem-based, but with px fallbacks for slides) */\n  --fs-overline: 0.6875rem;   /* 11px — labels, tags */\n  --fs-meta:     0.75rem;     /* 12px — timestamps */\n  --fs-body-sm:  0.8125rem;   /* 13px — table rows, secondary */\n  --fs-body:     0.9375rem;   /* 15px — default body */\n  --fs-body-lg:  1.0625rem;   /* 17px — lead paragraph */\n  --fs-h4:       1.25rem;     /* 20px */\n  --fs-h3:       1.5rem;      /* 24px */\n  --fs-h2:       2rem;        /* 32px */\n  --fs-h1:       2.75rem;     /* 44px */\n  --fs-display:  4rem;        /* 64px — hero */\n\n  --lh-tight: 1.12;\n  --lh-snug:  1.3;\n  --lh-body:  1.55;\n\n  --tracking-tight: -0.02em;\n  --tracking-normal: 0;\n  --tracking-loose:  0.08em;\n  --tracking-caps:   0.14em;\n\n  /* Spacing — 4px base. Use these, not raw px. */\n  --s-1: 4px;\n  --s-2: 8px;\n  --s-3: 12px;\n  --s-4: 16px;\n  --s-5: 20px;\n  --s-6: 24px;\n  --s-8: 32px;\n  --s-10: 40px;\n  --s-12: 48px;\n  --s-16: 64px;\n  --s-20: 80px;\n\n  /* Radii — pill-and-square, no in-between */\n  --r-1: 4px;     /* tight chips */\n  --r-2: 8px;     /* inputs, small cards */\n  --r-3: 12px;    /* default card */\n  --r-4: 16px;    /* feature card */\n  --r-5: 24px;    /* hero panel */\n  --r-pill: 999px;\n\n  /* Shadows — outer (depth) + inner (glass rim) */\n  --shadow-1: 0 1px 2px rgba(0,0,0,0.4);\n  --shadow-2: 0 4px 16px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.04) inset;\n  --shadow-3: 0 12px 40px rgba(0,0,0,0.6), 0 1px 0 rgba(255,255,255,0.05) inset;\n  --shadow-4: 0 24px 80px rgba(0,0,0,0.7), 0 1px 0 rgba(255,255,255,0.06) inset;\n  --rim:      inset 0 1px 0 rgba(255,255,255,0.06),\n              inset 0 0 0 1px rgba(148,163,210,0.08);\n\n  /* Glass — the signature surface. Composed via background +\n     backdrop-filter + rim shadow. Use --glass-bg on background. */\n  --glass-bg:  linear-gradient(180deg,\n                 rgba(22, 27, 44, 0.72) 0%,\n                 rgba(15, 19, 32, 0.62) 100%);\n  --glass-blur: saturate(140%) blur(18px);\n\n  /* Motion */\n  --ease-out:    cubic-bezier(0.22, 1, 0.36, 1);\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);\n  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);\n  --dur-1: 120ms;\n  --dur-2: 200ms;\n  --dur-3: 320ms;\n  --dur-4: 520ms;\n}\n\n/* -------------------------------------------------------------\n   2. Skin overrides — only the accent layer changes.\n   ------------------------------------------------------------- */\n[data-skin=\"exercir\"] {\n  --accent:        #6dd2ff;\n  --accent-strong: #38bdf8;\n  --accent-deep:   #0ea5e9;\n  --accent-soft:   rgba(109, 210, 255, 0.16);\n  --accent-rim:    rgba(109, 210, 255, 0.45);\n  --glow:          0 0 24px rgba(109, 210, 255, 0.45),\n                   0 0 80px rgba(56, 189, 248, 0.18);\n  --glow-soft:     0 0 12px rgba(109, 210, 255, 0.30);\n}\n[data-skin=\"strategir\"] {\n  --accent:        #c9a9ff;\n  --accent-strong: #a78bfa;\n  --accent-deep:   #7c3aed;\n  --accent-soft:   rgba(201, 169, 255, 0.16);\n  --accent-rim:    rgba(201, 169, 255, 0.45);\n  --glow:          0 0 24px rgba(201, 169, 255, 0.45),\n                   0 0 80px rgba(167, 139, 250, 0.20);\n  --glow-soft:     0 0 12px rgba(201, 169, 255, 0.30);\n}\n[data-skin=\"operir\"] {\n  --accent:        #6df0b3;\n  --accent-strong: #34d399;\n  --accent-deep:   #10b981;\n  --accent-soft:   rgba(109, 240, 179, 0.16);\n  --accent-rim:    rgba(109, 240, 179, 0.45);\n  --glow:          0 0 24px rgba(109, 240, 179, 0.45),\n                   0 0 80px rgba(52, 211, 153, 0.18);\n  --glow-soft:     0 0 12px rgba(109, 240, 179, 0.30);\n}\n\n/* -------------------------------------------------------------\n   3. Element defaults — semantic mapping.\n   ------------------------------------------------------------- */\nhtml, body {\n  background: var(--bg-0);\n  color: var(--fg-1);\n  font-family: var(--font-body);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  font-feature-settings: \"ss01\", \"cv11\";\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4 {\n  font-family: var(--font-display);\n  font-weight: 600;\n  letter-spacing: var(--tracking-tight);\n  line-height: var(--lh-tight);\n  color: var(--fg-1);\n  margin: 0;\n}\nh1 { font-size: var(--fs-h1); }\nh2 { font-size: var(--fs-h2); }\nh3 { font-size: var(--fs-h3); font-weight: 500; }\nh4 { font-size: var(--fs-h4); font-weight: 500; }\n\np { margin: 0; }\n\ncode, pre, kbd, samp {\n  font-family: var(--font-mono);\n  font-size: 0.92em;\n  font-feature-settings: \"ss02\", \"cv01\";\n}\n\n/* The signature: an \"overline\" caps label used everywhere\n   in the product (panel titles, KPI labels, sidebar groups). */\n.overline {\n  font-family: var(--font-mono);\n  font-size: var(--fs-overline);\n  letter-spacing: var(--tracking-caps);\n  text-transform: uppercase;\n  color: var(--fg-3);\n  font-weight: 500;\n}\n\n/* Glass panel — the foundational surface of the system. */\n.glass {\n  background: var(--glass-bg);\n  backdrop-filter: var(--glass-blur);\n  -webkit-backdrop-filter: var(--glass-blur);\n  border: 1px solid var(--line-1);\n  border-radius: var(--r-3);\n  box-shadow: var(--shadow-2), var(--rim);\n}\n\n/* The ambient halo behind hero glass panels. */\n.halo::before {\n  content: \"\";\n  position: absolute;\n  inset: -40% -10%;\n  background: radial-gradient(ellipse at 50% 0%, var(--accent-soft), transparent 60%);\n  filter: blur(40px);\n  z-index: -1;\n  pointer-events: none;\n}\n\n/* Selection */\n::selection { background: var(--accent-soft); color: var(--fg-1); }\n\n/* Scrollbar — slim, glass-friendly */\n::-webkit-scrollbar { width: 10px; height: 10px; }\n::-webkit-scrollbar-track { background: transparent; }\n::-webkit-scrollbar-thumb {\n  background: var(--line-2);\n  border-radius: var(--r-pill);\n  border: 2px solid transparent;\n  background-clip: padding-box;\n}\n::-webkit-scrollbar-thumb:hover { background: var(--line-3); background-clip: padding-box; }\n\n\n* { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; min-height: 100vh; }\nbody {\n  background:\n    radial-gradient(ellipse at 85% -10%, rgba(109,210,255,0.10), transparent 55%),\n    radial-gradient(ellipse at 5% 110%, rgba(167,139,250,0.06), transparent 55%),\n    var(--bg-0);\n  background-attachment: fixed;\n}\n[data-skin=\"exercir\"]  body { background: radial-gradient(ellipse at 85% -10%, rgba(109,210,255,0.10), transparent 55%), radial-gradient(ellipse at 5% 110%, rgba(167,139,250,0.06), transparent 55%), var(--bg-0); }\n[data-skin=\"strategir\"] body { background: radial-gradient(ellipse at 85% -10%, rgba(201,169,255,0.12), transparent 55%), radial-gradient(ellipse at 5% 110%, rgba(109,210,255,0.06), transparent 55%), var(--bg-0); }\n[data-skin=\"operir\"]    body { background: radial-gradient(ellipse at 85% -10%, rgba(109,240,179,0.10), transparent 55%), radial-gradient(ellipse at 5% 110%, rgba(109,210,255,0.06), transparent 55%), var(--bg-0); }\n\nbutton { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }\ninput { font: inherit; color: inherit; background: none; border: 0; outline: 0; }\n\n/* ==================== App shell ==================== */\n.xapp { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }\n.xmain { display: flex; flex-direction: column; min-width: 0; }\n.xcontent { flex: 1; padding: 28px 32px; min-width: 0; }\n\n/* ==================== Sidebar ==================== */\n.xsidebar {\n  position: sticky; top: 0;\n  height: 100vh;\n  background: linear-gradient(180deg, rgba(10,13,20,0.85), rgba(5,6,8,0.85));\n  backdrop-filter: blur(18px);\n  border-right: 1px solid var(--line-1);\n  display: flex; flex-direction: column;\n  padding: 18px 14px;\n  gap: 22px;\n}\n.xsb-logo { display: flex; align-items: center; gap: 10px; padding: 4px 8px; }\n.xsb-name { font-family: var(--font-display); font-weight: 600; font-size: 18px; letter-spacing: -0.03em; }\n.xsb-nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }\n.xsb-item {\n  display: flex; align-items: center; gap: 12px;\n  padding: 8px 12px;\n  border-radius: 8px;\n  color: var(--fg-2);\n  font-size: 13px;\n  transition: all 120ms var(--ease-out);\n}\n.xsb-item:hover { background: var(--bg-3); color: var(--fg-1); }\n.xsb-item.active {\n  background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent);\n  color: var(--fg-1);\n  box-shadow: inset 0 0 0 1px var(--line-2);\n}\n.xsb-item.active svg {\n  color: var(--accent);\n  filter: drop-shadow(0 0 6px var(--accent-rim));\n}\n.xsb-skin { padding: 12px; border-top: 1px solid var(--line-1); }\n.xsb-skin-row { display: flex; gap: 8px; }\n.xsb-swatch {\n  width: 22px; height: 22px; border-radius: 50%;\n  background: var(--c);\n  box-shadow: 0 0 8px color-mix(in srgb, var(--c) 50%, transparent);\n  border: 1px solid var(--line-2);\n  transition: transform 120ms var(--ease-out);\n}\n.xsb-swatch:hover { transform: scale(1.1); }\n.xsb-swatch.active {\n  box-shadow: 0 0 0 2px var(--bg-0), 0 0 0 3px var(--c), 0 0 12px var(--c);\n}\n\n/* ==================== Top bar ==================== */\n.xtopbar {\n  height: 56px;\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 0 28px;\n  border-bottom: 1px solid var(--line-1);\n  background: linear-gradient(180deg, rgba(10,13,20,0.6), transparent);\n  backdrop-filter: blur(12px);\n  position: sticky; top: 0; z-index: 10;\n}\n.xcrumb { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--fg-3); font-family: var(--font-mono); }\n.xcrumb-sep { color: var(--fg-4); }\n.xcrumb-last { color: var(--fg-1); }\n.xtopbar-right { display: flex; align-items: center; gap: 10px; }\n.xsearch {\n  display: flex; align-items: center; gap: 8px;\n  width: 280px; height: 32px;\n  padding: 0 10px;\n  background: var(--bg-inset);\n  border: 1px solid var(--line-1);\n  border-radius: 8px;\n  color: var(--fg-3);\n}\n.xsearch input { flex: 1; font-size: 13px; }\n.xsearch input::placeholder { color: var(--fg-4); }\n.xicon-btn {\n  width: 32px; height: 32px;\n  display: flex; align-items: center; justify-content: center;\n  border-radius: 8px;\n  color: var(--fg-2);\n  position: relative;\n  transition: all 120ms var(--ease-out);\n}\n.xicon-btn:hover { background: var(--bg-3); color: var(--fg-1); }\n.xbell-dot { position: absolute; top: 8px; right: 8px; width: 6px; height: 6px; background: var(--err); border-radius: 50%; box-shadow: 0 0 6px var(--err); }\n.xavatar {\n  width: 32px; height: 32px; border-radius: 50%;\n  background: linear-gradient(135deg, var(--accent-deep), var(--accent));\n  display: flex; align-items: center; justify-content: center;\n  font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--fg-on-glow);\n  box-shadow: 0 0 0 1px var(--line-2), inset 0 1px 0 rgba(255,255,255,0.2);\n}\n\n/* ==================== Page heads ==================== */\n.xpage, .xdash { display: flex; flex-direction: column; gap: 20px; }\n.xpage-head, .xdash-head { display: flex; justify-content: space-between; align-items: flex-end; gap: 16px; }\n.xmeta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em; }\n.xback { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); padding: 4px 0; transition: color 120ms; }\n.xback:hover { color: var(--fg-1); }\n\n/* ==================== Cards ==================== */\n.xcard {\n  background: var(--glass-bg);\n  backdrop-filter: var(--glass-blur);\n  border: 1px solid var(--line-1);\n  border-radius: 12px;\n  padding: 16px 18px;\n  box-shadow: 0 6px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);\n  position: relative;\n  overflow: hidden;\n}\n.xcard-feature {\n  border-color: var(--accent-rim);\n  box-shadow: 0 0 24px color-mix(in srgb, var(--accent) 20%, transparent), 0 6px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);\n}\n.xcard-bar {\n  position: absolute; left: 0; right: 0; top: 0;\n  height: 2px;\n  background: linear-gradient(90deg, transparent, var(--accent), transparent);\n  box-shadow: 0 0 8px var(--accent-rim);\n}\n\n/* ==================== KPI ==================== */\n.xkpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }\n.xkpi-head { display: flex; justify-content: space-between; align-items: center; }\n.xkpi-num { font-family: var(--font-display); font-size: 36px; font-weight: 600; letter-spacing: -0.03em; color: var(--fg-1); margin-top: 8px; line-height: 1; }\n.xkpi-unit { font-family: var(--font-mono); font-size: 14px; color: var(--fg-3); margin-left: 4px; font-weight: 400; letter-spacing: 0; }\n.xkpi-trend { font-family: var(--font-mono); font-size: 11px; }\n.xkpi-trend.up   { color: var(--ok); }\n.xkpi-trend.down { color: var(--ok); }\n.xkpi-trend.bad  { color: var(--err); }\n\n/* ==================== Dash split ==================== */\n.xdash-split { display: grid; grid-template-columns: 1.4fr 1fr; gap: 14px; }\n.xpanel-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid var(--line-1); }\n.xlink { color: var(--accent); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em; }\n.xlink:hover { text-shadow: 0 0 8px var(--accent-rim); }\n\n/* ==================== Logs ==================== */\n.xlog { font-family: var(--font-mono); font-size: 12px; }\n.xlog-tall { max-height: 480px; overflow: auto; }\n.xlog-row { display: grid; grid-template-columns: 64px 44px 130px 1fr; gap: 12px; padding: 6px 18px; border-bottom: 1px solid var(--line-1); align-items: baseline; }\n.xlog-row:last-child { border-bottom: 0; }\n.xlog-row:hover { background: rgba(255,255,255,0.02); }\n.xlog-t { color: var(--fg-3); }\n.xlog-srv { color: var(--fg-2); }\n.xlog-msg { color: var(--fg-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n.xlog-lvl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; padding: 1px 6px; border-radius: 4px; text-align: center; align-self: center; }\n.xlog-info .xlog-lvl { color: var(--info); background: var(--info-bg); }\n.xlog-warn .xlog-lvl { color: var(--warn); background: var(--warn-bg); }\n.xlog-err  .xlog-lvl { color: var(--err);  background: var(--err-bg); }\n.xlog-err  .xlog-msg { color: #ff8a96; }\n\n/* ==================== Toolbar ==================== */\n.xtoolbar { display: flex; align-items: center; gap: 10px; }\n.xseg {\n  display: flex; padding: 3px;\n  background: var(--bg-inset);\n  border: 1px solid var(--line-1);\n  border-radius: 8px;\n  gap: 2px;\n}\n.xseg button {\n  padding: 4px 12px;\n  border-radius: 6px;\n  font-size: 12px;\n  color: var(--fg-3);\n  font-family: var(--font-mono);\n  letter-spacing: 0.02em;\n  transition: all 120ms var(--ease-out);\n}\n.xseg button:hover { color: var(--fg-1); }\n.xseg button.active {\n  background: var(--bg-3);\n  color: var(--fg-1);\n  box-shadow: inset 0 0 0 1px var(--line-2);\n}\n\n/* ==================== Inputs (atom) ==================== */\n.xinp {\n  display: flex; align-items: center; gap: 8px;\n  height: 34px; padding: 0 10px;\n  background: var(--bg-inset);\n  border: 1px solid var(--line-1);\n  border-radius: 8px;\n  color: var(--fg-3);\n  flex: 1;\n  transition: all 160ms var(--ease-out);\n  box-shadow: inset 0 1px 2px rgba(0,0,0,0.4);\n}\n.xinp input { flex: 1; font-size: 13px; color: var(--fg-1); }\n.xinp input.mono { font-family: var(--font-mono); font-size: 12px; }\n.xinp input::placeholder { color: var(--fg-4); }\n.xinp:focus-within {\n  border-color: var(--accent-rim);\n  box-shadow: 0 0 0 3px var(--accent-soft), inset 0 1px 2px rgba(0,0,0,0.4);\n}\n\n/* ==================== Buttons ==================== */\n.xbtn {\n  display: inline-flex; align-items: center; gap: 8px;\n  height: 32px; padding: 0 14px;\n  border-radius: 8px;\n  font-family: var(--font-body); font-size: 13px; font-weight: 500;\n  letter-spacing: -0.01em;\n  border: 1px solid transparent;\n  transition: all 160ms var(--ease-out);\n  white-space: nowrap;\n}\n.xbtn:active { transform: scale(0.98); }\n.xbtn-primary {\n  background: linear-gradient(180deg, var(--accent), var(--accent-strong));\n  color: var(--fg-on-glow);\n  box-shadow:\n    0 0 0 1px var(--accent-rim),\n    0 0 18px color-mix(in srgb, var(--accent) 40%, transparent),\n    inset 0 1px 0 rgba(255,255,255,0.4);\n}\n.xbtn-primary:hover {\n  filter: brightness(1.1);\n  box-shadow:\n    0 0 0 1px var(--accent-rim),\n    0 0 28px color-mix(in srgb, var(--accent) 60%, transparent),\n    inset 0 1px 0 rgba(255,255,255,0.4);\n}\n.xbtn-glass {\n  background: linear-gradient(180deg, rgba(34,40,62,0.7), rgba(22,27,44,0.7));\n  color: var(--fg-1);\n  border-color: var(--line-2);\n  backdrop-filter: blur(8px);\n  box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);\n}\n.xbtn-glass:hover { border-color: var(--line-3); background: linear-gradient(180deg, rgba(40,46,70,0.7), rgba(28,33,52,0.7)); }\n.xbtn-ghost { background: transparent; color: var(--fg-2); border-color: var(--line-1); }\n.xbtn-ghost:hover { color: var(--fg-1); border-color: var(--line-2); }\n\n/* ==================== Badges ==================== */\n.xb {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 2px 8px;\n  border-radius: 999px;\n  font-family: var(--font-mono); font-size: 11px;\n  border: 1px solid transparent;\n  letter-spacing: 0.02em;\n  white-space: nowrap;\n}\n.xb-ok    { background: var(--ok-bg);   color: var(--ok);   border-color: rgba(34,211,154,0.25); }\n.xb-warn  { background: var(--warn-bg); color: var(--warn); border-color: rgba(245,181,68,0.25); }\n.xb-err   { background: var(--err-bg);  color: var(--err);  border-color: rgba(255,93,108,0.30); }\n.xb-info  { background: var(--info-bg); color: var(--info); border-color: rgba(109,210,255,0.30); }\n.xb-neutral { background: var(--bg-3); color: var(--fg-2); border-color: var(--line-2); }\n.xb-tag   { background: transparent; color: var(--fg-3); border-color: var(--line-1); border-radius: 4px; padding: 1px 6px; font-size: 10px; }\n.xb-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; box-shadow: 0 0 6px currentColor; }\n.xb-dot.pulse { animation: xpulse 1.6s ease-in-out infinite; }\n@keyframes xpulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }\n\n/* ==================== Status dots ==================== */\n.xdot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 6px currentColor; }\n.xdot-ok   { background: var(--ok);   color: var(--ok); }\n.xdot-warn { background: var(--warn); color: var(--warn); }\n.xdot-err  { background: var(--err);  color: var(--err); }\n.xdot-info { background: var(--info); color: var(--info); }\n.xdot.pulse { animation: xpulse 1.6s ease-in-out infinite; }\n\n/* ==================== KBD ==================== */\n.xkbd {\n  display: inline-flex; align-items: center; justify-content: center;\n  height: 18px; min-width: 18px; padding: 0 4px;\n  background: var(--bg-3);\n  border: 1px solid var(--line-2);\n  border-bottom-width: 2px;\n  border-radius: 4px;\n  font-family: var(--font-mono); font-size: 10px; color: var(--fg-2);\n}\n\n/* ==================== Tables ==================== */\n.xtable { width: 100%; border-collapse: collapse; font-size: 13px; }\n.xtable th {\n  text-align: left;\n  padding: 10px 14px;\n  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;\n  color: var(--fg-3); font-weight: 500;\n  border-bottom: 1px solid var(--line-1);\n}\n.xtable td {\n  padding: 12px 14px;\n  border-bottom: 1px solid var(--line-1);\n  color: var(--fg-1);\n}\n.xtable tbody tr { cursor: pointer; transition: background 120ms; }\n.xtable tbody tr:hover { background: rgba(109,210,255,0.04); }\n.xtable tbody tr:last-child td { border-bottom: 0; }\n.xtbl-name { font-weight: 500; color: var(--fg-1); font-family: var(--font-mono); font-size: 13px; }\n.mono { font-family: var(--font-mono); }\n\n/* ==================== Modal ==================== */\n.xmodal-bg {\n  position: fixed; inset: 0; z-index: 100;\n  background: rgba(5,6,8,0.7);\n  backdrop-filter: blur(8px);\n  display: flex; align-items: center; justify-content: center;\n  animation: xfade 160ms ease-out;\n}\n@keyframes xfade { from { opacity: 0; } to { opacity: 1; } }\n.xmodal {\n  width: min(520px, calc(100vw - 32px));\n  background: linear-gradient(180deg, rgba(22,27,44,0.92), rgba(15,19,32,0.92));\n  backdrop-filter: blur(24px);\n  border: 1px solid var(--line-2);\n  border-radius: 16px;\n  box-shadow:\n    0 0 0 1px rgba(109,210,255,0.10),\n    0 24px 80px rgba(0,0,0,0.7),\n    inset 0 1px 0 rgba(255,255,255,0.06);\n  animation: xpop 200ms var(--ease-out);\n}\n@keyframes xpop { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }\n.xmodal-head { display: flex; justify-content: space-between; align-items: flex-start; padding: 20px 22px 12px; }\n.xmodal-body { padding: 8px 22px; display: flex; flex-direction: column; gap: 16px; }\n.xmodal-foot { padding: 16px 22px 20px; display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid var(--line-1); margin-top: 12px; }\n.xfield { display: flex; flex-direction: column; gap: 6px; }\n.xhelp { font-size: 11px; color: var(--fg-3); }\n\n/* ==================== Observer ==================== */\n.xobs { display: flex; flex-direction: column; gap: 18px; min-height: 0; height: calc(100vh - 56px - 56px); }\n.xobs-head { display: flex; justify-content: space-between; align-items: flex-end; gap: 16px; }\n.xobs-pill {\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 5px 12px; border-radius: 999px;\n  background: var(--bg-3); border: 1px solid var(--line-2);\n  font-family: var(--font-mono); font-size: 11px; color: var(--fg-2);\n  letter-spacing: 0.04em;\n}\n\n.xobs-stats {\n  display: flex; gap: 14px;\n  background: var(--glass-bg);\n  backdrop-filter: var(--glass-blur);\n  border: 1px solid var(--line-1);\n  border-radius: 12px;\n  padding: 14px 18px;\n  box-shadow: 0 6px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);\n}\n.xobs-stat { flex: 1; min-width: 0; }\n.xobs-stat-num {\n  font-family: var(--font-display); font-size: 26px; font-weight: 600;\n  letter-spacing: -0.03em; line-height: 1; margin-top: 8px; color: var(--fg-1);\n}\n.xobs-unit { font-family: var(--font-mono); font-size: 12px; color: var(--fg-3); margin-left: 4px; font-weight: 400; }\n\n.xspark { display: flex; align-items: flex-end; gap: 2px; height: 40px; margin-top: 8px; }\n.xspark-bar { flex: 1; min-height: 2px; border-radius: 1px 1px 0 0; opacity: 0.85; }\n.xspark-ok      { background: var(--accent); box-shadow: 0 0 4px var(--accent-rim); }\n.xspark-warn    { background: var(--warn); }\n.xspark-err     { background: var(--err); }\n.xspark-neutral { background: var(--line-2); }\n\n.xobs-toolbar { display: flex; align-items: center; gap: 10px; }\n\n.xobs-split {\n  display: grid;\n  grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr);\n  gap: 14px;\n  flex: 1;\n  min-height: 0;\n}\n\n.xobs-stream {\n  flex: 1;\n  overflow: auto;\n  font-family: var(--font-mono); font-size: 12px;\n  display: flex; flex-direction: column;\n}\n.xobs-row {\n  display: grid;\n  grid-template-columns: 96px 14px 90px 1fr 18px 40px 70px;\n  gap: 10px; align-items: center;\n  padding: 8px 18px;\n  border-bottom: 1px solid var(--line-1);\n  text-align: left;\n  width: 100%;\n  cursor: pointer;\n  transition: background 80ms;\n  animation: xrowin 220ms var(--ease-out);\n}\n@keyframes xrowin {\n  from { opacity: 0; transform: translateX(-4px); background: var(--accent-soft); }\n  to   { opacity: 1; transform: translateX(0); background: transparent; }\n}\n.xobs-row:hover { background: rgba(255,255,255,0.02); }\n.xobs-row.active {\n  background: var(--accent-soft);\n  box-shadow: inset 2px 0 0 var(--accent);\n}\n.xobs-ts { color: var(--fg-3); }\n.xobs-server { color: var(--fg-2); }\n.xobs-tool { color: var(--fg-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n.xobs-arrow { color: var(--fg-3); text-align: center; }\n.xobs-arrow.notif { color: var(--accent); }\n.xobs-code { color: var(--fg-3); text-align: right; }\n.xobs-dur { text-align: right; }\n.xobs-dur-ok   { color: var(--fg-2); }\n.xobs-dur-warn { color: var(--warn); }\n.xobs-dur-err  { color: var(--err); }\n\n.xobs-tool-name {\n  font-family: var(--font-mono); font-size: 16px; font-weight: 500;\n  color: var(--fg-1); letter-spacing: -0.01em;\n}\n.xobs-tool-meta { display: flex; gap: 6px; align-items: center; width: 100%; flex-wrap: wrap; }\n.xobs-inspect { padding: 16px 18px; overflow: auto; display: flex; flex-direction: column; gap: 18px; flex: 1; min-height: 0; }\n\n.xobs-trace { display: flex; flex-direction: column; gap: 4px; padding: 10px 12px; background: var(--bg-inset); border: 1px solid var(--line-1); border-radius: 8px; }\n.xobs-trace-row { display: grid; grid-template-columns: 60px 1fr 60px; gap: 10px; align-items: center; font-family: var(--font-mono); font-size: 10px; }\n.xobs-trace-lbl { color: var(--fg-3); letter-spacing: 0.06em; text-transform: uppercase; }\n.xobs-trace-line { position: relative; height: 8px; background: rgba(148,163,210,0.06); border-radius: 4px; overflow: hidden; }\n.xobs-trace-fill { display: block; height: 100%; background: var(--fg-3); border-radius: 4px; }\n.xobs-trace-strong { background: var(--accent); box-shadow: 0 0 6px var(--accent-rim); }\n.xobs-trace-time { color: var(--fg-2); text-align: right; }\n\n.xobs-section { display: flex; flex-direction: column; gap: 8px; }\n.xobs-section-head { display: flex; justify-content: space-between; align-items: center; }\n\n.xjson {\n  margin: 0; padding: 12px 14px;\n  background: var(--bg-inset); border: 1px solid var(--line-1); border-radius: 8px;\n  font-family: var(--font-mono); font-size: 12px;\n  line-height: 1.55; color: var(--fg-2);\n  white-space: pre-wrap; word-break: break-word;\n  overflow-x: auto;\n}\n.j-key  { color: var(--accent); }\n.j-str  { color: #6df0b3; }\n.j-num  { color: #f5b544; }\n.j-bool { color: #c9a9ff; }\n.j-null { color: var(--fg-4); }\n\n/* ==================== Eyecatchers ==================== */\n.ec-hero {\n  display: flex;\n  background: var(--glass-bg);\n  backdrop-filter: var(--glass-blur);\n  border: 1px solid var(--line-1);\n  border-radius: 14px;\n  box-shadow: 0 12px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);\n  padding: 18px 22px;\n  gap: 24px;\n  align-items: center;\n  position: relative;\n  overflow: hidden;\n}\n.ec-hero::before {\n  content: \"\";\n  position: absolute;\n  inset: -50% -10% auto -10%;\n  height: 120%;\n  background: radial-gradient(ellipse at 80% 0%, var(--accent-soft), transparent 60%);\n  z-index: 0;\n  pointer-events: none;\n}\n.ec-hero > * { position: relative; z-index: 1; }\n.ec-hero-text { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }\n.ec-hero-text .ec-h1 { font-family: var(--font-display); font-weight: 600; font-size: 32px; letter-spacing: -0.03em; color: var(--fg-1); line-height: 1.05; }\n.ec-hero-text .ec-h1 .accent { color: var(--accent); text-shadow: 0 0 18px var(--accent-rim); }\n.ec-hero-text .ec-sub { font-size: 14px; color: var(--fg-2); margin-top: 6px; max-width: 540px; line-height: 1.5; }\n.ec-hero-text .ec-meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.06em; margin-top: 10px; display: flex; gap: 18px; }\n.ec-hero-text .ec-meta b { color: var(--fg-1); font-weight: 500; }\n\n/* Pulse (Observer) */\n.ec-pulse { position: relative; width: 220px; height: 220px; flex-shrink: 0; }\n.ec-pulse-svg { width: 100%; height: 100%; }\n.ec-pulse-meta { position: absolute; left: 0; bottom: 0; }\n.ec-pulse-num { font-family: var(--font-display); font-size: 28px; font-weight: 600; color: var(--accent); text-shadow: 0 0 12px var(--accent-rim); line-height: 1; }\n\n/* Globe (Dashboard / Servers) */\n.ec-globe { position: relative; flex-shrink: 0; display: flex; align-items: center; gap: 16px; }\n.ec-globe-svg { width: 560px; height: 200px; display: block; }\n.ec-globe-legend { font-size: 12px; color: var(--fg-2); display: flex; flex-direction: column; gap: 6px; }\n.ec-globe-legend-row { display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 11px; }\n.ec-dot { width: 7px; height: 7px; border-radius: 50%; box-shadow: 0 0 6px currentColor; }\n.ec-pulse-ring { animation: ec-ring 2s ease-out infinite; transform-origin: center; transform-box: fill-box; }\n@keyframes ec-ring { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(2.2); opacity: 0; } }\n\n/* Bloom (Tools) */\n.ec-bloom { display: flex; align-items: center; gap: 18px; flex-shrink: 0; }\n.ec-bloom-svg { width: 220px; height: 220px; display: block; }\n.ec-bloom-list { display: flex; flex-direction: column; gap: 6px; font-family: var(--font-mono); font-size: 11px; min-width: 220px; }\n.ec-bloom-row { display: grid; grid-template-columns: 8px 1fr auto; 20,0.5),transparent);backdrop-filter:blur(10px);\">\n      <div style=\"display:inline-flex;align-items:center;gap:9px;padding:5px 12px;border-radius:999px;background:var(--bg-3);border:1px solid var(--line-2);\">\n        <span style=\"width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 7px var(--accent);animation:xpulse 1.6s ease-in-out infinite;\"><\u002Fspan>\n        <span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:0.06em;color:var(--fg-2);\">live preview<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:16px;\">\n        <sc-if value=\"{{ isDiagram }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;align-items:center;gap:11px;font-family:var(--font-mono);font-size:11px;color:var(--fg-3);letter-spacing:0.04em;\">\n            <span><b style=\"color:var(--fg-1);font-weight:500;\">{{ nodeCount }}<\u002Fb> nodes<\u002Fspan>\n            <span style=\"color:var(--fg-4);\">·<\u002Fspan>\n            <span><b style=\"color:var(--fg-1);font-weight:500;\">{{ primCount }}<\u002Fb> primitives<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display:flex;align-items:center;gap:4px;padding:3px;background:var(--bg-inset);border:1px solid var(--line-1);border-radius:8px;\">\n          <button onclick=\"{{ setDiagram }}\" style=\"{{ tabDiagramStyle }}\">◇ diagram<\u002Fbutton>\n          <button onclick=\"{{ setCode }}\" style=\"{{ tabCodeStyle }}\">{ } code<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:44px;background-image:{{ gridBg }};background-size:24px 24px;\">\n      <div style=\"position:absolute;inset:-20% 10% auto 10%;height:60%;background:radial-gradient(ellipse at 50% 0%,var(--accent-soft),transparent 65%);filter:blur(50px);pointer-events:none;\"><\u002Fdiv>\n\n      <sc-if value=\"{{ isDiagram }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"width:100%;height:100%;max-width:1040px;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;\">\n          {{ previewEl }}\n        <\u002Fdiv>\n        <div style=\"position:absolute;left:22px;bottom:18px;display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.06em;color:var(--fg-4);\">\n          <span style=\"width:24px;height:1px;background:var(--line-2);\"><\u002Fspan>tree of <span style=\"color:var(--fg-2);\">{{ kind }}<\u002Fspan> nodes\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isCode }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"width:100%;max-width:760px;height:100%;max-height:780px;display:flex;flex-direction:column;position:relative;z-index:1;background:var(--glass-bg);backdrop-filter:var(--glass-blur);border:1px solid var(--line-1);border-radius:14px;box-shadow:0 14px 44px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.05);overflow:hidden;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line-1);flex:none;\">\n            <div style=\"display:flex;align-items:center;gap:11px;\">\n              <div style=\"display:flex;gap:6px;\">\n                <span style=\"width:9px;height:9px;border-radius:50%;background:var(--err);box-shadow:0 0 6px var(--err);\"><\u002Fspan>\n                <span style=\"width:9px;height:9px;border-radius:50%;background:var(--warn);box-shadow:0 0 6px var(--warn);\"><\u002Fspan>\n                <span style=\"width:9px;height:9px;border-radius:50%;background:var(--ok);box-shadow:0 0 6px var(--ok);\"><\u002Fspan>\n              <\u002Fdiv>\n              <span style=\"font-family:var(--font-mono);font-size:12px;color:var(--fg-2);letter-spacing:0.06em;\">shape.json<\u002Fspan>\n              <span class=\"xb xb-neutral\">read only<\u002Fspan>\n            <\u002Fdiv>\n            <button onclick=\"{{ copyJson }}\" class=\"xb xb-neutral\" style=\"cursor:pointer;\">{{ copyLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"bes-scroll\" style=\"flex:1;overflow:auto;min-height:0;background:var(--bg-inset);\">\n            {{ jsonElBig }}\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: &quot;100%&quot; },\n  &quot;skin&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;exercir&quot;, &quot;strategir&quot;, &quot;operir&quot;], &quot;default&quot;: &quot;exercir&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;canvasGrid&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.state = this.initial();\n  }\n\n  NODES = [\n    { id: 'n_ws',     label: 'Workspace',   meta: 'root',     x: 356, y: 30,  parent: null },\n    { id: 'n_srv',    label: 'Servers',     meta: '2 online', x: 150, y: 206, parent: 'n_ws' },\n    { id: 'n_tool',   label: 'Tools',       meta: '18 active',x: 560, y: 206, parent: 'n_ws' },\n    { id: 'n_stripe', label: 'stripe-prod', meta: 'healthy',  x: 38,  y: 382, parent: 'n_srv' },\n    { id: 'n_gh',     label: 'github',      meta: 'healthy',  x: 268, y: 382, parent: 'n_srv' },\n    { id: 'n_vec',    label: 'vector-db',   meta: 'degraded', x: 560, y: 382, parent: 'n_tool' },\n  ];\n\n  uid() { return 'p' + Math.random().toString(36).slice(2, 8); }\n\n  initial() {\n    return {\n      kind: 'card-node',\n      ariaName: '{label}, a {kind}',\n      ix: { addChild: true, remove: true, reparent: false },\n      bounds: { x: 0, y: 0, w: 208, h: 76 },\n      prims: [\n        { id: this.uid(), type: 'rectangle', x: 0, y: 0, w: 208, h: 76, radius: 14, fill: '#111a2e', stroke: '#6dd2ff' },\n        { id: this.uid(), type: 'text', x: 18, y: 44, text: '{label}', align: 'left', fill: '#e8ecf7' },\n      ],\n      addOpen: false,\n      copied: false,\n      view: 'diagram',\n    };\n  }\n\n  num(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }\n\n  defaults(type) {\n    const b = this.state.bounds;\n    if (type === 'rectangle') return { x: 0, y: 0, w: b.w, h: b.h, radius: 14, fill: '#111a2e', stroke: '#6dd2ff' };\n    if (type === 'text')      return { x: 18, y: Math.round(b.h / 2) + 5, text: '{label}', align: 'left', fill: '#e8ecf7' };\n    if (type === 'circle')    return { cx: 22, cy: Math.round(b.h / 2), r: 10, fill: '#6dd2ff', stroke: '#0ea5e9' };\n    if (type === 'line')      return { x1: 16, y1: b.h - 16, x2: b.w - 16, y2: b.h - 16, stroke: '#3d4a66' };\n    return {};\n  }\n\n  setKind = (e) => this.setState({ kind: e.target.value });\n  setAria = (e) => this.setState({ ariaName: e.target.value });\n  setBound(k, v) { this.setState((s) => ({ bounds: { ...s.bounds, [k]: this.num(v) } })); }\n  toggleIx(k) { this.setState((s) => ({ ix: { ...s.ix, [k]: !s.ix[k] } })); }\n\n  setPrim(id, key, val) { this.setState((s) => ({ prims: s.prims.map((p) => p.id === id ? { ...p, [key]: val } : p) })); }\n  setType(id, type) { this.setState((s) => ({ prims: s.prims.map((p) => p.id === id ? { id: p.id, type, ...this.defaults(type) } : p) })); }\n  move(id, dir) {\n    this.setState((s) => {\n      const a = [...s.prims];\n      const i = a.findIndex((p) => p.id === id);\n      const j = i + dir;\n      if (j < 0 || j >= a.length) return {};\n      [a[i], a[j]] = [a[j], a[i]];\n      return { prims: a };\n    });\n  }\n  del(id) { this.setState((s) => ({ prims: s.prims.filter((p) => p.id !== id) })); }\n  add(type) { this.setState((s) => ({ prims: [...s.prims, { id: this.uid(), ...this.defaults(type) }], addOpen: false })); }\n  reset() { this.setState(this.initial()); }\n\n  segStyle(active) {\n    const base = 'padding:5px 11px;border-radius:6px;font-family:var(--font-mono);font-size:11px;letter-spacing:0.02em;text-transform:capitalize;border:0;cursor:pointer;transition:all .12s;';\n    return base + (active\n      ? 'background:var(--bg-3);color:var(--fg-1);box-shadow:inset 0 0 0 1px var(--line-2);'\n      : 'background:transparent;color:var(--fg-3);');\n  }\n  alnStyle(active) {\n    const base = 'padding:5px 13px;border-radius:5px;font-family:var(--font-mono);font-size:11px;border:0;cursor:pointer;text-transform:capitalize;transition:all .12s;';\n    return base + (active ? 'background:var(--accent-soft);color:var(--accent);' : 'background:transparent;color:var(--fg-3);');\n  }\n  iconStyle(enabled) {\n    const base = 'width:26px;height:26px;display:grid;place-items:center;background:transparent;border:1px solid var(--line-1);border-radius:6px;color:var(--fg-3);cursor:pointer;font-size:13px;font-family:var(--font-mono);transition:all .12s;';\n    return base + (enabled ? '' : 'opacity:.28;pointer-events:none;');\n  }\n\n  fieldsFor(p) {\n    const num = (key, label) => ({ key, label, value: p[key], isNum: true, cellStyle: '', on: (e) => this.setPrim(p.id, key, this.num(e.target.value)) });\n    const col = (key, label) => ({ key, label, value: p[key], isColor: true, cellStyle: 'grid-column:span 2;', on: (e) => this.setPrim(p.id, key, e.target.value) });\n    const txt = (key, label) => ({ key, label, value: p[key], isText: true, cellStyle: 'grid-column:span 4;', on: (e) => this.setPrim(p.id, key, e.target.value) });\n    const aln = (key, label) => ({\n      key, label, isAlign: true, cellStyle: 'grid-column:span 4;',\n      lStyle: this.alnStyle(p[key] === 'left'), cStyle: this.alnStyle(p[key] === 'center'), rStyle: this.alnStyle(p[key] === 'right'),\n      setL: () => this.setPrim(p.id, key, 'left'), setC: () => this.setPrim(p.id, key, 'center'), setR: () => this.setPrim(p.id, key, 'right'),\n    });\n    switch (p.type) {\n      case 'rectangle': return [num('x', 'x'), num('y', 'y'), num('w', 'w'), num('h', 'h'), num('radius', 'radius'), col('fill', 'fill'), col('stroke', 'stroke')];\n      case 'text':      return [num('x', 'x'), num('y', 'y'), txt('text', 'text value'), aln('align', 'align'), col('fill', 'fill')];\n      case 'circle':    return [num('cx', 'cx'), num('cy', 'cy'), num('r', 'r'), col('fill', 'fill'), col('stroke', 'stroke')];\n      case 'line':      return [num('x1', 'x1'), num('y1', 'y1'), num('x2', 'x2'), num('y2', 'y2'), col('stroke', 'stroke')];\n    }\n    return [];\n  }\n\n  authored() {\n    const { kind, ariaName, ix, bounds, prims } = this.state;\n    return {\n      kind, name: ariaName,\n      interactions: { addChild: ix.addChild, remove: ix.remove, reparent: ix.reparent },\n      bounds,\n      primitives: prims.map((p) => { const { id, ...rest } = p; return rest; }),\n    };\n  }\n\n  tabStyle(active) {\n    const base = 'display:inline-flex;align-items:center;gap:6px;padding:5px 13px;border-radius:6px;border:0;cursor:pointer;font-family:var(--font-mono);font-size:11px;letter-spacing:0.03em;transition:all .14s;';\n    return base + (active\n      ? 'background:var(--bg-3);color:var(--fg-1);box-shadow:inset 0 0 0 1px var(--line-2);'\n      : 'background:transparent;color:var(--fg-3);');\n  }\n\n  highlight(obj, style) {\n    const json = JSON.stringify(obj, null, 2);\n    const re = /(\"(?:\\\\.|[^\"\\\\])*\"\\s*:)|(\"(?:\\\\.|[^\"\\\\])*\")|\\b(true|false|null)\\b|(-?\\d+\\.?\\d*)/g;\n    const parts = [];\n    let last = 0, m, k = 0;\n    while ((m = re.exec(json))) {\n      if (m.index > last) parts.push(json.slice(last, m.index));\n      let cls = 'j-num';\n      if (m[1]) cls = 'j-key';\n      else if (m[2]) cls = 'j-str';\n      else if (m[3]) cls = (m[3] === 'null' ? 'j-null' : 'j-bool');\n      parts.push(React.createElement('span', { key: k++, className: cls }, m[0]));\n      last = re.lastIndex;\n    }\n    if (last < json.length) parts.push(json.slice(last));\n    return React.createElement('pre', { className: 'xjson', style: style || { margin: 0, maxHeight: '280px', overflow: 'auto', fontSize: '12px' } }, parts);\n  }\n\n  drawPrim(p, j, node, kind) {\n    const E = React.createElement;\n    const key = node.id + '_' + j;\n    if (p.type === 'rectangle') return E('rect', { key, x: p.x, y: p.y, width: p.w, height: p.h, rx: p.radius, fill: p.fill, stroke: p.stroke, strokeWidth: 1.5 });\n    if (p.type === 'circle')    return E('circle', { key, cx: p.cx, cy: p.cy, r: p.r, fill: p.fill, stroke: p.stroke, strokeWidth: 1.5 });\n    if (p.type === 'line')      return E('line', { key, x1: p.x1, y1: p.y1, x2: p.x2, y2: p.y2, stroke: p.stroke, strokeWidth: 1.5 });\n    if (p.type === 'text') {\n      const anchor = p.align === 'center' ? 'middle' : p.align === 'right' ? 'end' : 'start';\n      const t = String(p.text || '').replace(/\\{label\\}/g, node.label).replace(/\\{kind\\}/g, kind).replace(/\\{meta\\}/g, node.meta || '');\n      return E('text', { key, x: p.x, y: p.y, fill: p.fill, textAnchor: anchor, fontFamily: 'var(--font-body)', fontSize: 15, fontWeight: 600, letterSpacing: '-0.01em' }, t);\n    }\n    return null;\n  }\n\n  buildPreview() {\n    const { bounds, prims, kind } = this.state;\n    const E = React.createElement;\n    const W = bounds.w, H = bounds.h;\n    const nodes = this.NODES;\n    const byId = Object.fromEntries(nodes.map((n) => [n.id, n]));\n    const edges = nodes.filter((n) => n.parent).map((n, i) => {\n      const par = byId[n.parent];\n      const sx = par.x + W / 2, sy = par.y + H, ex = n.x + W / 2, ey = n.y;\n      const my = (sy + ey) / 2;\n      const d = `M ${sx} ${sy} C ${sx} ${my}, ${ex} ${my}, ${ex} ${ey}`;\n      return E('g', { key: 'e' + i }, [\n        E('path', { key: 'p', d, fill: 'none', stroke: 'var(--line-2)', strokeWidth: 1.5 }),\n        E('circle', { key: 'a', cx: sx, cy: sy, r: 2.5, fill: 'var(--accent)', opacity: 0.5 }),\n      ]);\n    });\n    const drawn = nodes.map((n) => {\n      const kids = prims.map((p, j) => this.drawPrim(p, j, n, kind));\n      return E('g', { key: n.id, transform: `translate(${n.x},${n.y})`, style: { transition: 'transform .25s var(--ease-out)' } }, kids);\n    });\n    return E('svg', {\n      viewBox: '0 0 820 500', width: '100%', height: '100%',\n      preserveAspectRatio: 'xMidYMid meet', style: { overflow: 'visible' },\n    }, [E('g', { key: 'edges' }, edges), E('g', { key: 'nodes' }, drawn)]);\n  }\n\n  copyJson = () => {\n    try { navigator.clipboard.writeText(JSON.stringify(this.authored(), null, 2)); } catch (e) {}\n    this.setState({ copied: true });\n    clearTimeout(this._ct);\n    this._ct = setTimeout(() => this.setState({ copied: false }), 1400);\n  };\n\n  renderVals() {\n    const s = this.state;\n    const TYPEDOT = { rectangle: '#6dd2ff', text: '#c9a9ff', circle: '#22d39a', line: '#f5b544' };\n    const TYPES = ['rectangle', 'text', 'circle', 'line'];\n\n    const prims = s.prims.map((p, idx) => ({\n      id: p.id, type: p.type, dot: TYPEDOT[p.type] || '#6dd2ff',\n      num: '0' + (idx + 1),\n      types: TYPES.map((t) => ({ label: t, on: () => this.setType(p.id, t), style: this.segStyle(p.type === t) })),\n      fields: this.fieldsFor(p),\n      up: () => this.move(p.id, -1), down: () => this.move(p.id, 1), del: () => this.del(p.id),\n      upStyle: this.iconStyle(idx > 0), downStyle: this.iconStyle(idx < s.prims.length - 1),\n    }));\n\n    return {\n      skin: this.props.skin ?? 'exercir',\n      gridBg: (this.props.canvasGrid ?? true)\n        ? 'radial-gradient(circle,rgba(148,163,210,0.22) 1.4px,transparent 1.6px)'\n        : 'none',\n\n      kind: s.kind, ariaName: s.ariaName,\n      setKind: this.setKind, setAria: this.setAria,\n\n      ix: [\n        { label: 'Add child', desc: 'spawn a node beneath this one', cls: s.ix.addChild ? 'on' : '', toggle: () => this.toggleIx('addChild') },\n        { label: 'Remove', desc: 'delete the node and its subtree', cls: s.ix.remove ? 'on' : '', toggle: () => this.toggleIx('remove') },\n        { label: 'Re-parent (drag)', desc: 'drag a node onto a new parent', cls: s.ix.reparent ? 'on' : '', toggle: () => this.toggleIx('reparent') },\n      ],\n\n      bounds: ['x', 'y', 'w', 'h'].map((k) => ({ key: k, label: k, value: s.bounds[k], on: (e) => this.setBound(k, e.target.value) })),\n\n      prims,\n      primCount: s.prims.length,\n      nodeCount: this.NODES.length,\n\n      addOpen: s.addOpen,\n      addLabel: s.addOpen ? '× close picker' : '+ add primitive',\n      toggleAdd: () => this.setState((st) => ({ addOpen: !st.addOpen })),\n      addTypes: TYPES.map((t) => ({ label: t, dot: TYPEDOT[t], on: () => this.add(t) })),\n\n      jsonElBig: this.highlight(this.authored(), { margin: 0, fontSize: '13px', lineHeight: 1.7, background: 'transparent', border: 0, padding: '8px 18px' }),\n      copyJson: this.copyJson,\n      copyLabel: s.copied ? 'copied ✓' : 'copy',\n      previewEl: this.buildPreview(),\n      reset: () => this.reset(),\n\n      isDiagram: s.view === 'diagram',\n      isCode: s.view === 'code',\n      setDiagram: () => this.setState({ view: 'diagram' }),\n      setCode: () => this.setState({ view: 'code' }),\n      tabDiagramStyle: this.tabStyle(s.view === 'diagram'),\n      tabCodeStyle: this.tabStyle(s.view === 'code'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
