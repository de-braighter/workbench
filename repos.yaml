# de-braighter cluster repo manifest — read by the init-workbench skill.
#
# The cluster root (this repo, de-braighter/workbench) is already cloned; init-workbench
# clones these sibling repos from the workbench's own origin org (de-braighter) into
# layers/ and domains/. Each is its own git repo, gitignored at the cluster root.
#
# Add a repo here when a new layer or domain joins the cluster. Group decides the clone
# target: layers/* -> layers/<name>, domains/* -> domains/<name>.
repos:
  layers:
    - substrate       # kernel — @de-braighter/substrate-{contracts,runtime}
    - design-system   # bricks / eyecatchers + design tokens
    - specs           # spec catalogue — ADRs, concepts, handbook (no app code)
    - platform        # infra-as-code + shared dev-Docker docs
    - foundation      # shared foundation libraries
    - foundry-core    # Foundry SDK — manifest protocol + skins (@de-braighter/foundry-core)
    - charter-runtime # charter-runtime program — consumed by foundry-core (link:../charter-runtime)
    - knowledge       # Knowledge layer — artifact graph, retrieval, citations (@de-braighter/knowledge)
  domains:
    - exercir         # team sports (live pack-football work)
    - conservation
    - devloop         # SDLC-on-substrate — the dev twin (internal tooling)
    - herdbook        # livestock registry (animal CRUD, pedigree, people/roles)
    - markets         # external-source integration demonstrator (source spine + crypto consumer)
    - agri-ecosystem-twin  # regenerative-farm digital twin — A-vs-B ecological counterfactuals (Foundry T0)
    - studio          # plan-tree authoring studio seed — Angular app over the published board-kit brick (private)
    - foundry         # the Foundry control plane — claim-MCP server for the multi-product machine (queue + atomic claims + founder gates + warm pool); ADR-241
    - health          # health domain — FHIR R5 projection lib + PHI data layer (B1 field-encryption); ADR-222 / ADR-204
    - scenario-lab    # domain-agnostic synthetic-scenario engine over the survival-inference substrate (Studio seeds off this)
    - whales-and-bubbles   # single-player-first economic-strategy game on the substrate (T0 prototype)
